services:
  - type: web
    name: clarify-sdrai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8

  - type: web
    name: clarify-sdr-frontend
    runtime: static
    staticPublishPath: .
    buildCommand: ""
